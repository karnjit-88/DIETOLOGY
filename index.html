<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dietology — Owner Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--m:#3db886;--m1:#e8f7f0;--m2:#c5ead9;--m4:#2a8f66;--p1:#fef0ea;--p2:#fcd5bf;--y1:#fdfae8;--y2:#f5eea3;--y3:#c8aa20;--r1:#fdeef3;--r2:#f8c8d8;--r3:#d4547e;--s1:#eaf4fe;--s2:#bddcfa;--s3:#3a8dde;--l1:#f0eefe;--l2:#d8d1fb;--l3:#7c6fe0;--tx:#2d2d2d;--txm:#6b6b6b;--txl:#9a9a9a;--bg:#faf9f7;--card:#fff;--bd:#e8e8e8;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;background:var(--card);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:10;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-dot{width:34px;height:34px;border-radius:10px;background:var(--m);display:flex;align-items:center;justify-content:center;}
.brand-dot svg{width:17px;height:17px;fill:#fff;}
.brand-name{font-size:17px;font-weight:600;letter-spacing:-.3px;}
.brand-name em{font-style:normal;color:var(--m);}
.tag{font-size:11px;padding:4px 11px;border-radius:20px;font-weight:500;}
.tag-owner{background:var(--m1);color:var(--m4);border:1px solid var(--m2);}
.tag-client{background:var(--p1);color:#a04030;border:1px solid var(--p2);}
.wrap{max-width:980px;margin:0 auto;padding:1.25rem 1rem 3rem;}
.card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:1.25rem;}
.btn{border:none;padding:10px 20px;border-radius:11px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;min-height:40px;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-green{background:var(--m);color:#fff;}
.btn-sky{background:var(--s1);color:var(--s3);border:1px solid var(--s2);}
.btn-red{background:var(--r1);color:var(--r3);border:1px solid var(--r2);}
.btn-ghost{background:transparent;border:1px solid var(--bd);color:var(--txm);}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.25rem;}
.stat{border-radius:14px;padding:1rem;}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;}
.badge-ok{background:var(--m1);color:var(--m4);border:1px solid var(--m2);}
.badge-warn{background:var(--y1);color:var(--y3);border:1px solid var(--y2);}
.badge-exp{background:var(--r1);color:var(--r3);border:1px solid var(--r2);}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.dot-ok{background:var(--m);}
.dot-warn{background:var(--y3);}
.dot-exp{background:var(--r3);}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
.av-0{background:#c5ead9;color:#2a8f66;}
.av-1{background:#fcd5bf;color:#a04030;}
.av-2{background:#d8d1fb;color:#7c6fe0;}
.av-3{background:#f5eea3;color:#c8aa20;}
.av-4{background:#f8c8d8;color:#d4547e;}
input,select{width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:10px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--tx);}
input:focus,select:focus{outline:none;border-color:var(--m);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.fl{font-size:12px;font-weight:500;color:var(--txm);}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:100;align-items:center;justify-content:center;padding:1rem;}
.modal-bg.open{display:flex;}
.modal{background:var(--card);border-radius:18px;padding:1.5rem;width:100%;max-width:460px;border:1px solid var(--bd);}
.modal-title{font-size:16px;font-weight:600;margin-bottom:1.25rem;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}
.week-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.week-grid{display:grid;grid-template-columns:repeat(7,minmax(110px,1fr));gap:8px;min-width:780px;}
.day-card{background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:9px;}
.day-card.today{border-color:var(--m);background:var(--m1);}
.day-hdr{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txl);margin-bottom:6px;}
.day-card.today .day-hdr{color:var(--m4);}
.mp{font-size:10px;border-radius:7px;padding:3px 7px;margin-bottom:4px;background:#fff;border:1px solid var(--bd);line-height:1.35;}
.mp.B{border-left:3px solid #f4c0d1;}
.mp.L{border-left:3px solid #bddcfa;}
.mp.D{border-left:3px solid #c5ead9;}
.mp.S{border-left:3px solid #f5eea3;}
.prog-track{height:7px;background:#efefef;border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;background:var(--m);}
.prog-fill.amber{background:var(--y3);}
.screen{display:none;}
.screen.active{display:block;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.wnav{display:flex;align-items:center;gap:10px;margin-bottom:1rem;}
.wnav-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--bd);background:var(--bg);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--txm);}
.wnav-btn:hover{background:var(--m1);}
.wnav-label{font-size:13px;font-weight:500;flex:1;text-align:center;}
.code-box{background:var(--m1);border:1px solid var(--m2);border-radius:13px;padding:1rem;margin-top:1rem;}
.notif-panel{background:var(--l1);border:1px solid var(--l2);border-radius:16px;padding:1.25rem;margin-bottom:1rem;}
.notif-title{font-size:12px;font-weight:600;color:var(--l3);margin-bottom:.875rem;}
.nitem{background:var(--card);border:1px solid var(--l2);border-radius:11px;padding:9px 12px;display:flex;gap:10px;align-items:flex-start;margin-bottom:7px;}
.ntime{font-size:11px;font-weight:600;color:var(--l3);min-width:58px;}
.ntxt{font-size:12px;color:var(--tx);}
.nmeal{font-size:11px;color:var(--txm);margin-top:1px;}
@media(max-width:640px){.form-row{grid-template-columns:1fr;}.topbar{padding:.875rem 1rem;}}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="screen active">
  <div class="login-wrap">
    <div style="width:100%;max-width:400px;">
      <div style="text-align:center;margin-bottom:2rem;">
        <div style="display:flex;justify-content:center;margin-bottom:1rem;">
          <div class="brand"><div class="brand-dot"><svg viewBox="0 0 18 18"><path d="M9 1.5L11.8 7H17L12.6 10.6L14.3 16.5L9 13.1L3.7 16.5L5.4 10.6L1 7H6.2Z"/></svg></div><span class="brand-name">DIET<em>OLOGY</em></span></div>
        </div>
        <p style="font-size:13px;color:var(--txm);">Owner dashboard</p>
      </div>
      <div class="card">
        <h2 style="font-size:17px;font-weight:600;margin-bottom:1.5rem;">Sign in</h2>
        <div class="fg"><label class="fl">Email</label><input type="email" id="login-email" placeholder="owner@dietology.com"/></div>
        <div class="fg"><label class="fl">Password</label><input type="password" id="login-password" placeholder="••••••••"/></div>
        <p id="login-error" style="font-size:12px;color:var(--r3);margin-bottom:12px;display:none;"></p>
        <button class="btn btn-green" onclick="doLogin()" style="width:100%;">Sign in</button>
      </div>
      <p style="text-align:center;margin-top:1.5rem;font-size:12px;color:var(--txl);">
        Are you a client? <a href="client.html" style="color:var(--m);font-weight:500;">View your plan →</a>
      </p>
    </div>
  </div>
</div>

<!-- DASHBOARD SCREEN -->
<div id="dashboard-screen" class="screen">
  <div class="topbar">
    <div class="brand"><div class="brand-dot"><svg viewBox="0 0 18 18"><path d="M9 1.5L11.8 7H17L12.6 10.6L14.3 16.5L9 13.1L3.7 16.5L5.4 10.6L1 7H6.2Z"/></svg></div><span class="brand-name">DIET<em>OLOGY</em></span></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="tag tag-owner">Owner</span>
      <button class="btn btn-ghost" onclick="doLogout()" style="font-size:12px;padding:6px 14px;min-height:32px;">Sign out</button>
    </div>
  </div>
  <div class="wrap">
    <div class="stats">
      <div class="stat" style="background:var(--m1);border:1px solid var(--m2);"><div style="font-size:11px;font-weight:600;color:var(--m4);margin-bottom:4px;">Total clients</div><div style="font-size:26px;font-weight:600;color:var(--m4);" id="st-total">0</div></div>
      <div class="stat" style="background:var(--s1);border:1px solid var(--s2);"><div style="font-size:11px;font-weight:600;color:var(--s3);margin-bottom:4px;">Active plans</div><div style="font-size:26px;font-weight:600;color:var(--s3);" id="st-active">0</div></div>
      <div class="stat" style="background:var(--y1);border:1px solid var(--y2);"><div style="font-size:11px;font-weight:600;color:var(--y3);margin-bottom:4px;">Expiring soon</div><div style="font-size:26px;font-weight:600;color:var(--y3);" id="st-expiring">0</div></div>
      <div class="stat" style="background:var(--r1);border:1px solid var(--r2);"><div style="font-size:11px;font-weight:600;color:var(--r3);margin-bottom:4px;">Expired</div><div style="font-size:26px;font-weight:600;color:var(--r3);" id="st-expired">0</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <span style="font-size:13px;font-weight:500;color:var(--txm);">Client plans</span>
      <button class="btn btn-green" onclick="openAddModal()">+ Add client</button>
    </div>
    <div id="client-list" style="display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem;"></div>
    <div id="client-detail" style="display:none;"></div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-bg" id="add-modal">
  <div class="modal">
    <div class="modal-title">Add new client</div>
    <div class="form-row">
      <div class="fg"><label class="fl">Full name *</label><input id="n-name" placeholder="Client name"/></div>
      <div class="fg"><label class="fl">Email</label><input type="email" id="n-email" placeholder="client@email.com"/></div>
    </div>
    <div class="form-row">
      <div class="fg"><label class="fl">Plan title *</label><input id="n-plan" placeholder="e.g. Weight loss 8wk"/></div>
      <div class="fg"><label class="fl">Calories/day</label><input id="n-cal" placeholder="2000"/></div>
    </div>
    <div class="form-row">
      <div class="fg"><label class="fl">Start date</label><input type="date" id="n-start"/></div>
      <div class="fg"><label class="fl">Expiry date *</label><input type="date" id="n-expiry"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn btn-green" onclick="addClient()">Create client</button>
    </div>
  </div>
</div>

<!-- RENEW MODAL -->
<div class="modal-bg" id="renew-modal">
  <div class="modal">
    <div class="modal-title">Renew plan</div>
    <div class="fg"><label class="fl">New expiry date</label><input type="date" id="renew-date"/></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('renew-modal')">Cancel</button>
      <button class="btn btn-green" onclick="doRenew()">Renew</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG — REPLACE THESE WITH YOUR SUPABASE VALUES ──
const SUPABASE_URL = 'https://abcdefgh.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3Zm1nb3lib3VsdnF5d2lreHpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MDkzNTUsImV4cCI6MjA4OTI4NTM1NX0.pFVSNVGATzTjJR6NkofA8PPwnNEYcJ_XkMl_N5ag8Sc'
const OWNER_EMAIL = 'karnjit88@gmail.com'
const OWNER_PASSWORD = 'Sharry@88'
// ─────────────────────────────────────────────────────

const API = SUPABASE_URL + '/rest/v1'
const HEADERS = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' }

const MEALS = [
  {B:'Oats + berries',L:'Grilled chicken salad',D:'Salmon + quinoa',S:'Greek yogurt'},
  {B:'Avocado toast',L:'Lentil soup + bread',D:'Tofu stir-fry + rice',S:'Apple + almond butter'},
  {B:'Smoothie bowl',L:'Turkey wrap',D:'Baked cod + veggies',S:'Hummus + carrots'},
  {B:'Scrambled eggs',L:'Quinoa grain bowl',D:'Chicken curry + rice',S:'Mixed nuts'},
  {B:'Chia pudding',L:'Caesar salad',D:'Beef stir-fry + noodles',S:'Banana + peanut butter'},
  {B:'Whole wheat pancakes',L:'Veggie Buddha bowl',D:'Grilled shrimp + couscous',S:'Cottage cheese'},
  {B:'Yogurt parfait',L:'Tuna salad sandwich',D:'Roast chicken + sweet potato',S:'Fruit salad'},
]
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun']
const MEAL_TIMES = {B:'8:00 AM',L:'1:00 PM',S:'4:00 PM',D:'7:30 PM'}

let clients = [], selectedId = null, weekOffset = 0

function today(){ return new Date().toISOString().split('T')[0] }
function addDays(n){ const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split('T')[0] }
function fmt(d){ return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) }
function fmtS(d){ return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}) }
function daysLeft(e){ const n=new Date();n.setHours(0,0,0,0);return Math.round((new Date(e)-n)/86400000) }
function status(c){ const d=daysLeft(c.expiry_date);if(!c.is_active||d<0)return'exp';if(d<=7)return'warn';return'ok' }
function initials(n){ return n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase() }
function genCode(){ return 'DT-'+Math.floor(1000+Math.random()*9000) }

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

function doLogin(){
  const email = document.getElementById('login-email').value.trim()
  const password = document.getElementById('login-password').value
  const err = document.getElementById('login-error')
  if(email === OWNER_EMAIL && password === OWNER_PASSWORD){
    localStorage.setItem('dietology_owner','1')
    err.style.display='none'
    showScreen('dashboard-screen')
    loadClients()
  } else {
    err.textContent = 'Invalid email or password.'
    err.style.display = 'block'
  }
}

function doLogout(){
  localStorage.removeItem('dietology_owner')
  showScreen('login-screen')
}

async function loadClients(){
  const res = await fetch(API+'/clients?order=created_at.desc', {headers: HEADERS})
  clients = await res.json()
  renderClients()
}

function renderClients(){
  const total=clients.length
  const active=clients.filter(c=>status(c)==='ok').length
  const expiring=clients.filter(c=>status(c)==='warn').length
  const expired=clients.filter(c=>status(c)==='exp').length
  document.getElementById('st-total').textContent=total
  document.getElementById('st-active').textContent=active
  document.getElementById('st-expiring').textContent=expiring
  document.getElementById('st-expired').textContent=expired

  const list = document.getElementById('client-list')
  list.innerHTML = clients.map((c,i)=>{
    const st=status(c), dl=daysLeft(c.expiry_date)
    const sel = selectedId===c.id
    return `<div onclick="selectClient('${c.id}')" style="cursor:pointer;background:${sel?'var(--m1)':'var(--card)'};border:${sel?'2px solid var(--m)':'1px solid var(--bd)'};border-radius:16px;padding:1rem;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div class="av av-${i%5}">${initials(c.name)}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:14px;">${c.name}</div>
          <div style="font-size:12px;color:var(--txm);margin-top:1px;">${c.plan_title}</div>
        </div>
        <span class="badge badge-${st}"><span class="dot dot-${st}"></span>${st==='ok'?'Active':st==='warn'?'Expiring soon':'Expired'}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;">
        <span style="color:${st==='exp'?'var(--r3)':st==='warn'?'var(--y3)':'var(--txm)'}">${st==='exp'?'Expired '+fmt(c.expiry_date):'Expires '+fmt(c.expiry_date)}</span>
        <span style="font-family:monospace;background:#f2f2f2;padding:2px 7px;border-radius:6px;color:var(--txl);">${c.access_code}</span>
      </div>
    </div>`
  }).join('')
}

function selectClient(id){
  selectedId = id; weekOffset = 0
  renderClients()
  const c = clients.find(x=>x.id===id)
  const st = status(c), dl = daysLeft(c.expiry_date)
  const total=Math.max(1,Math.round((new Date(c.expiry_date)-new Date(c.start_date))/86400000))
  const elapsed=Math.max(0,Math.round((new Date()-new Date(c.start_date))/86400000))
  const prog=Math.min(100,Math.round(elapsed/total*100))
  const det = document.getElementById('client-detail')
  det.style.display='block'

  let html = `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:1.25rem;">
      <div><div style="font-size:15px;font-weight:600;">${c.name}</div><div style="font-size:12px;color:var(--txm);margin-top:2px;">${c.plan_title}</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-sky" onclick="openRenewModal()">Renew plan</button>
        <button class="btn btn-red" onclick="revokeClient('${c.id}')">Revoke</button>
      </div>
    </div>`

  if(st==='exp'){
    html += `<div style="text-align:center;padding:2rem 1rem;">
      <div style="font-size:40px;margin-bottom:8px;">🔒</div>
      <div style="font-size:14px;font-weight:600;margin-bottom:6px;">Plan expired</div>
      <div style="font-size:12px;color:var(--txm);">Expired ${fmt(c.expiry_date)}. Click Renew to restore access.</div>
    </div>`
  } else {
    html += `<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem;">
      <div><div style="font-size:11px;color:var(--txm);">Start date</div><div style="font-size:13px;font-weight:600;margin-top:2px;">${fmt(c.start_date)}</div></div>
      <div><div style="font-size:11px;color:var(--txm);">Expires</div><div style="font-size:13px;font-weight:600;margin-top:2px;">${fmt(c.expiry_date)}</div></div>
      <div><div style="font-size:11px;color:var(--txm);">Days left</div><div style="font-size:13px;font-weight:600;margin-top:2px;color:${st==='warn'?'var(--y3)':'var(--tx)'}">${dl}</div></div>
      <div><div style="font-size:11px;color:var(--txm);">Calories/day</div><div style="font-size:13px;font-weight:600;margin-top:2px;">${c.calories_per_day} kcal</div></div>
    </div>
    <div style="margin-bottom:1.25rem;">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--txm);margin-bottom:5px;"><span>Plan progress</span><span>${prog}%</span></div>
      <div class="prog-track"><div class="prog-fill${st==='warn'?' amber':''}" style="width:${prog}%"></div></div>
    </div>
    <div style="margin-bottom:1.25rem;" id="week-section">${renderWeek(weekOffset)}</div>
    <div class="code-box">
      <div style="font-size:11px;color:var(--m4);font-weight:500;margin-bottom:6px;">Client access link — share via WhatsApp or email</div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <code style="font-size:12px;color:var(--m4);font-weight:600;word-break:break-all;">${window.location.origin}/client.html?code=${c.access_code}</code>
        <button onclick="copyLink('${c.access_code}')" id="copy-btn" style="background:var(--card);border:1px solid var(--m2);color:var(--m4);padding:6px 16px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;">Copy link</button>
      </div>
    </div>`
  }
  html += '</div>'
  det.innerHTML = html
}

function renderWeek(offset){
  const now=new Date();now.setHours(0,0,0,0)
  const mon=new Date(now);mon.setDate(mon.getDate()-((mon.getDay()+6)%7)+offset*7)
  const sun=new Date(mon);sun.setDate(sun.getDate()+6)
  let html=`<div class="wnav">
    <button class="wnav-btn" onclick="changeWeek(-1)">‹</button>
    <span class="wnav-label">${fmtS(mon)} — ${fmtS(sun)}</span>
    <button class="wnav-btn" onclick="changeWeek(1)">›</button>
  </div><div class="week-scroll"><div class="week-grid">`
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(d.getDate()+i)
    const isT=d.toISOString().split('T')[0]===today()
    const m=MEALS[(offset*7+i+700)%7]
    html+=`<div class="day-card${isT?' today':''}">
      <div class="day-hdr">${DAYS[i]} ${d.getDate()}</div>
      <div class="mp B">${m.B}</div>
      <div class="mp L">${m.L}</div>
      <div class="mp D">${m.D}</div>
      <div class="mp S">${m.S}</div>
    </div>`
  }
  html+=`</div></div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;">
    <span style="font-size:10px;display:flex;align-items:center;gap:4px;color:var(--txm);"><span style="width:9px;height:9px;border-radius:3px;background:#f4c0d1;display:inline-block;"></span>Breakfast</span>
    <span style="font-size:10px;display:flex;align-items:center;gap:4px;color:var(--txm);"><span style="width:9px;height:9px;border-radius:3px;background:#bddcfa;display:inline-block;"></span>Lunch</span>
    <span style="font-size:10px;display:flex;align-items:center;gap:4px;color:var(--txm);"><span style="width:9px;height:9px;border-radius:3px;background:#c5ead9;display:inline-block;"></span>Dinner</span>
    <span style="font-size:10px;display:flex;align-items:center;gap:4px;color:var(--txm);"><span style="width:9px;height:9px;border-radius:3px;background:#f5eea3;display:inline-block;"></span>Snack</span>
  </div>`
  return html
}

function changeWeek(dir){
  weekOffset+=dir
  const ws=document.getElementById('week-section')
  if(ws) ws.innerHTML=renderWeek(weekOffset)
}

function copyLink(code){
  const url=`${window.location.origin}/client.html?code=${code}`
  navigator.clipboard.writeText(url).catch(()=>{})
  const btn=document.getElementById('copy-btn')
  btn.textContent='Copied!'
  setTimeout(()=>btn.textContent='Copy link',2000)
}

function openAddModal(){
  document.getElementById('n-start').value=today()
  document.getElementById('n-expiry').value=addDays(28)
  document.getElementById('add-modal').classList.add('open')
}

function closeModal(id){ document.getElementById(id).classList.remove('open') }

async function addClient(){
  const name=document.getElementById('n-name').value.trim()
  const plan=document.getElementById('n-plan').value.trim()
  const expiry=document.getElementById('n-expiry').value
  if(!name||!plan||!expiry) return alert('Please fill in required fields')
  const code = genCode()
  const body = {
    name, email:document.getElementById('n-email').value.trim(),
    plan_title:plan, calories_per_day:parseInt(document.getElementById('n-cal').value)||2000,
    start_date:document.getElementById('n-start').value||today(),
    expiry_date:expiry, access_code:code, is_active:true
  }
  const res = await fetch(API+'/clients', {method:'POST', headers:HEADERS, body:JSON.stringify(body)})
  if(res.ok){
    closeModal('add-modal')
    await loadClients()
    const newC = clients.find(c=>c.access_code===code)
    if(newC) selectClient(newC.id)
  }
}

function openRenewModal(){
  document.getElementById('renew-date').value=addDays(28)
  document.getElementById('renew-modal').classList.add('open')
}

async function doRenew(){
  const date=document.getElementById('renew-date').value
  if(!date||!selectedId) return
  await fetch(API+'/clients?id=eq.'+selectedId, {
    method:'PATCH', headers:HEADERS,
    body:JSON.stringify({expiry_date:date,is_active:true})
  })
  closeModal('renew-modal')
  await loadClients()
  selectClient(selectedId)
}

async function revokeClient(id){
  if(!confirm('Revoke access for this client?')) return
  const yesterday=addDays(-1)
  await fetch(API+'/clients?id=eq.'+id, {
    method:'PATCH', headers:HEADERS,
    body:JSON.stringify({is_active:false,expiry_date:yesterday})
  })
  await loadClients()
  selectClient(id)
}

// Check if already logged in
if(localStorage.getItem('dietology_owner')==='1'){
  showScreen('dashboard-screen')
  loadClients()
}
</script>
